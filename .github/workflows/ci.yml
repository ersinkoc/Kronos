name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'
          cache: true

      - name: Check formatting
        run: test -z "$(gofmt -l -s $(find . -name '*.go' -not -path './.git/*' -not -path './.tools/*' -not -path './bin/*'))"

      - name: Vet
        run: go vet ./...

      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Staticcheck
        run: staticcheck ./...

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Govulncheck
        run: govulncheck ./...

      - name: Test
        run: go test -race ./...

      - name: Production readiness gate
        run: ./scripts/production-check.sh

      - name: Build
        run: go build -trimpath -o bin/kronos ./cmd/kronos

      - name: Check build script
        run: |
          sh -n scripts/build.sh
          sh -n scripts/release.sh
          sh -n scripts/provenance.sh
          sh -n scripts/sbom.sh
          sh -n scripts/verify-release.sh
          sh -n scripts/smoke-release.sh
          sh -n scripts/production-check.sh

      - name: Build release artifact
        run: |
          RELEASE_TARGETS=linux/amd64 VERSION=ci COMMIT=${GITHUB_SHA::12} BUILD_DATE=1970-01-01T00:00:00Z ./scripts/release.sh
          VERSION=ci COMMIT=${GITHUB_SHA::12} BUILD_DATE=1970-01-01T00:00:00Z ./scripts/provenance.sh
          VERSION=ci COMMIT=${GITHUB_SHA::12} BUILD_DATE=1970-01-01T00:00:00Z ./scripts/sbom.sh
          ./scripts/verify-release.sh bin
          ./scripts/smoke-release.sh bin

      - name: Build container image
        run: |
          docker build \
            --build-arg VERSION=ci \
            --build-arg COMMIT=${GITHUB_SHA::12} \
            --build-arg BUILD_DATE=1970-01-01T00:00:00Z \
            -t kronos:ci .

      - name: Check completion script
        run: ./bin/kronos completion bash | bash -n

  postgres-conformance:
    name: postgres-conformance (${{ matrix.postgres-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        postgres-version:
          - "15"
          - "16"
          - "17"
    services:
      postgres:
        image: postgres:${{ matrix.postgres-version }}
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'
          cache: true

      - name: Create matching PostgreSQL client wrappers
        env:
          POSTGRES_VERSION: ${{ matrix.postgres-version }}
        run: |
          mkdir -p .tools/postgres-client
          for command in pg_dump pg_dumpall psql; do
            cat > ".tools/postgres-client/${command}" <<'SH'
          #!/usr/bin/env sh
          set -eu
          command_name="$(basename "$0")"
          exec docker run -i --rm --network host --env PGPASSWORD "postgres:${POSTGRES_VERSION:?}" "$command_name" "$@"
          SH
            chmod +x ".tools/postgres-client/${command}"
          done
          echo "$PWD/.tools/postgres-client" >> "$GITHUB_PATH"

      - name: PostgreSQL conformance
        env:
          KRONOS_POSTGRES_TEST_DSN: postgres://postgres:postgres@127.0.0.1:5432/postgres?sslmode=disable
          POSTGRES_VERSION: ${{ matrix.postgres-version }}
        run: go test -tags=integration ./internal/drivers/postgres

  postgres-upgrade-rehearsal:
    name: postgres-upgrade-rehearsal (15-to-17)
    runs-on: ubuntu-latest
    services:
      postgres-source:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 15432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
      postgres-target:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 17432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'
          cache: true

      - name: Create PostgreSQL 17 client wrappers
        env:
          POSTGRES_VERSION: "17"
        run: |
          mkdir -p .tools/postgres-client
          for command in pg_dump pg_dumpall psql; do
            cat > ".tools/postgres-client/${command}" <<'SH'
          #!/usr/bin/env sh
          set -eu
          command_name="$(basename "$0")"
          exec docker run -i --rm --network host --env PGPASSWORD "postgres:${POSTGRES_VERSION:?}" "$command_name" "$@"
          SH
            chmod +x ".tools/postgres-client/${command}"
          done
          echo "$PWD/.tools/postgres-client" >> "$GITHUB_PATH"

      - name: PostgreSQL 15 to 17 restore rehearsal
        env:
          KRONOS_POSTGRES_TEST_DSN: postgres://postgres:postgres@127.0.0.1:15432/postgres?sslmode=disable
          KRONOS_POSTGRES_RESTORE_DSN: postgres://postgres:postgres@127.0.0.1:17432/postgres?sslmode=disable
          POSTGRES_VERSION: "17"
        run: go test -tags=integration ./internal/drivers/postgres

  postgres-full-global-restore-rehearsal:
    name: postgres-full-global-restore-rehearsal (17)
    runs-on: ubuntu-latest
    services:
      postgres-source:
        image: postgres:17
        env:
          POSTGRES_USER: kronos_source_admin
          POSTGRES_PASSWORD: postgres
        ports:
          - 18432:5432
        options: >-
          --health-cmd "pg_isready -U kronos_source_admin"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
      postgres-target:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 19432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'
          cache: true

      - name: Create PostgreSQL 17 client wrappers
        env:
          POSTGRES_VERSION: "17"
        run: |
          mkdir -p .tools/postgres-client
          for command in pg_dump pg_dumpall psql; do
            cat > ".tools/postgres-client/${command}" <<'SH'
          #!/usr/bin/env sh
          set -eu
          command_name="$(basename "$0")"
          exec docker run -i --rm --network host --env PGPASSWORD "postgres:${POSTGRES_VERSION:?}" "$command_name" "$@"
          SH
            chmod +x ".tools/postgres-client/${command}"
          done
          echo "$PWD/.tools/postgres-client" >> "$GITHUB_PATH"

      - name: PostgreSQL full global restore rehearsal
        env:
          KRONOS_POSTGRES_TEST_DSN: postgres://kronos_source_admin:postgres@127.0.0.1:18432/postgres?sslmode=disable
          KRONOS_POSTGRES_RESTORE_DSN: postgres://postgres:postgres@127.0.0.1:19432/postgres?sslmode=disable
          KRONOS_POSTGRES_FULL_GLOBAL_RESTORE: "true"
          POSTGRES_VERSION: "17"
        run: go test -tags=integration ./internal/drivers/postgres

  postgres-operator-scale-restore-drill:
    name: postgres-operator-scale-restore-drill (17)
    runs-on: ubuntu-latest
    services:
      postgres-source:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 20432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
      postgres-target:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 21432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'
          cache: true

      - name: Create PostgreSQL 17 client wrappers
        env:
          POSTGRES_VERSION: "17"
        run: |
          mkdir -p .tools/postgres-client
          for command in pg_dump pg_dumpall psql; do
            cat > ".tools/postgres-client/${command}" <<'SH'
          #!/usr/bin/env sh
          set -eu
          command_name="$(basename "$0")"
          exec docker run -i --rm --network host --env PGPASSWORD "postgres:${POSTGRES_VERSION:?}" "$command_name" "$@"
          SH
            chmod +x ".tools/postgres-client/${command}"
          done
          echo "$PWD/.tools/postgres-client" >> "$GITHUB_PATH"

      - name: PostgreSQL operator-scale restore drill
        env:
          KRONOS_POSTGRES_TEST_DSN: postgres://postgres:postgres@127.0.0.1:20432/postgres?sslmode=disable
          KRONOS_POSTGRES_RESTORE_DSN: postgres://postgres:postgres@127.0.0.1:21432/postgres?sslmode=disable
          KRONOS_POSTGRES_BULK_ROWS: "10000"
          KRONOS_POSTGRES_TEST_TIMEOUT_SECONDS: "180"
          POSTGRES_VERSION: "17"
        run: go test -tags=integration ./internal/drivers/postgres

  mysql-conformance:
    name: mysql-conformance (8.4)
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: mysql
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -uroot -pmysql"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'
          cache: true

      - name: Create MySQL client wrappers
        env:
          MYSQL_VERSION: "8.4"
        run: |
          mkdir -p .tools/mysql-client
          for command in mysql mysqldump; do
            cat > ".tools/mysql-client/${command}" <<'SH'
          #!/usr/bin/env sh
          set -eu
          command_name="$(basename "$0")"
          exec docker run -i --rm --network host -e MYSQL_PWD="${MYSQL_PWD:-}" "mysql:${MYSQL_VERSION:?}" "$command_name" "$@"
          SH
            chmod +x ".tools/mysql-client/${command}"
          done
          echo "$PWD/.tools/mysql-client" >> "$GITHUB_PATH"

      - name: MySQL conformance
        env:
          KRONOS_MYSQL_TEST_ADDR: 127.0.0.1:3306
          KRONOS_MYSQL_TEST_USER: root
          KRONOS_MYSQL_TEST_PASSWORD: mysql
          MYSQL_VERSION: "8.4"
        run: go test -tags=integration ./internal/drivers/mysql

  mariadb-conformance:
    name: mariadb-conformance (11.4)
    runs-on: ubuntu-latest
    services:
      mariadb:
        image: mariadb:11.4
        env:
          MARIADB_ROOT_PASSWORD: mariadb
        ports:
          - 3307:3306
        options: >-
          --health-cmd "healthcheck.sh --connect --innodb_initialized"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'
          cache: true

      - name: Create MariaDB client wrappers
        env:
          MARIADB_VERSION: "11.4"
        run: |
          mkdir -p .tools/mariadb-client
          for command in mysql mysqldump; do
            cat > ".tools/mariadb-client/${command}" <<'SH'
          #!/usr/bin/env sh
          set -eu
          command_name="$(basename "$0")"
          case "$command_name" in
            mysql) client_command="mariadb" ;;
            mysqldump) client_command="mariadb-dump" ;;
            *) client_command="$command_name" ;;
          esac
          exec docker run -i --rm --network host -e MYSQL_PWD="${MYSQL_PWD:-}" "mariadb:${MARIADB_VERSION:?}" "$client_command" "$@"
          SH
            chmod +x ".tools/mariadb-client/${command}"
          done
          echo "$PWD/.tools/mariadb-client" >> "$GITHUB_PATH"

      - name: MariaDB conformance
        env:
          KRONOS_MYSQL_TEST_ADDR: 127.0.0.1:3307
          KRONOS_MYSQL_TEST_USER: root
          KRONOS_MYSQL_TEST_PASSWORD: mariadb
          KRONOS_MYSQL_DUMP_SET_GTID_PURGED: omit
          MARIADB_VERSION: "11.4"
        run: go test -tags=integration ./internal/drivers/mysql

  mongodb-conformance:
    name: mongodb-conformance (${{ matrix.mongodb-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        mongodb-version:
          - "7.0"
          - "8.0"
    services:
      mongodb:
        image: mongodb/mongodb-community-server:${{ matrix.mongodb-version }}-ubuntu2204
        env:
          MONGO_INITDB_ROOT_USERNAME: kronos
          MONGO_INITDB_ROOT_PASSWORD: kronos
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet -u kronos -p kronos --authenticationDatabase admin --eval 'db.adminCommand(\"ping\").ok'"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'
          cache: true

      - name: Create MongoDB client wrappers
        env:
          MONGODB_IMAGE: mongodb/mongodb-community-server:${{ matrix.mongodb-version }}-ubuntu2204
        run: |
          mkdir -p .tools/mongodb-client
          for command in mongosh mongodump mongorestore; do
            cat > ".tools/mongodb-client/${command}" <<'SH'
          #!/usr/bin/env sh
          set -eu
          command_name="$(basename "$0")"
          exec docker run -i --rm --network host --user "$(id -u):$(id -g)" --volume /tmp:/tmp "${MONGODB_IMAGE:?}" "$command_name" "$@"
          SH
            chmod +x ".tools/mongodb-client/${command}"
          done
          echo "$PWD/.tools/mongodb-client" >> "$GITHUB_PATH"

      - name: MongoDB conformance
        env:
          KRONOS_MONGODB_TEST_ADDR: 127.0.0.1:27017
          KRONOS_MONGODB_TEST_USER: kronos
          KRONOS_MONGODB_TEST_PASSWORD: kronos
          KRONOS_MONGODB_TEST_AUTH_SOURCE: admin
          MONGODB_IMAGE: mongodb/mongodb-community-server:${{ matrix.mongodb-version }}-ubuntu2204
        run: go test -tags=integration ./internal/drivers/mongodb

  mongodb-operator-scale-restore-drill:
    name: mongodb-operator-scale-restore-drill (7.0)
    runs-on: ubuntu-latest
    services:
      mongodb-source:
        image: mongodb/mongodb-community-server:7.0-ubuntu2204
        env:
          MONGO_INITDB_ROOT_USERNAME: kronos
          MONGO_INITDB_ROOT_PASSWORD: kronos
        ports:
          - 27018:27017
        options: >-
          --health-cmd "mongosh --quiet -u kronos -p kronos --authenticationDatabase admin --eval 'db.adminCommand(\"ping\").ok'"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      mongodb-target:
        image: mongodb/mongodb-community-server:7.0-ubuntu2204
        env:
          MONGO_INITDB_ROOT_USERNAME: kronos
          MONGO_INITDB_ROOT_PASSWORD: kronos
        ports:
          - 27019:27017
        options: >-
          --health-cmd "mongosh --quiet -u kronos -p kronos --authenticationDatabase admin --eval 'db.adminCommand(\"ping\").ok'"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'
          cache: true

      - name: Create MongoDB client wrappers
        env:
          MONGODB_IMAGE: mongodb/mongodb-community-server:7.0-ubuntu2204
        run: |
          mkdir -p .tools/mongodb-client
          for command in mongosh mongodump mongorestore; do
            cat > ".tools/mongodb-client/${command}" <<'SH'
          #!/usr/bin/env sh
          set -eu
          command_name="$(basename "$0")"
          exec docker run -i --rm --network host --user "$(id -u):$(id -g)" --volume /tmp:/tmp "${MONGODB_IMAGE:?}" "$command_name" "$@"
          SH
            chmod +x ".tools/mongodb-client/${command}"
          done
          echo "$PWD/.tools/mongodb-client" >> "$GITHUB_PATH"

      - name: MongoDB operator-scale restore drill
        env:
          KRONOS_MONGODB_TEST_ADDR: 127.0.0.1:27018
          KRONOS_MONGODB_RESTORE_ADDR: 127.0.0.1:27019
          KRONOS_MONGODB_TEST_USER: kronos
          KRONOS_MONGODB_TEST_PASSWORD: kronos
          KRONOS_MONGODB_TEST_AUTH_SOURCE: admin
          KRONOS_MONGODB_RESTORE_USER: kronos
          KRONOS_MONGODB_RESTORE_PASSWORD: kronos
          KRONOS_MONGODB_RESTORE_AUTH_SOURCE: admin
          KRONOS_MONGODB_BULK_ROWS: "10000"
          KRONOS_MONGODB_TEST_TIMEOUT_SECONDS: "300"
          MONGODB_IMAGE: mongodb/mongodb-community-server:7.0-ubuntu2204
        run: go test -tags=integration ./internal/drivers/mongodb

  mysql-to-mariadb-restore-rehearsal:
    name: mysql-to-mariadb-restore-rehearsal (8.4-to-11.4)
    runs-on: ubuntu-latest
    services:
      mysql-source:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: mysql
        ports:
          - 13306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -uroot -pmysql"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      mariadb-target:
        image: mariadb:11.4
        env:
          MARIADB_ROOT_PASSWORD: mariadb
        ports:
          - 13307:3306
        options: >-
          --health-cmd "healthcheck.sh --connect --innodb_initialized"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'
          cache: true

      - name: Create MySQL client wrappers
        env:
          MYSQL_VERSION: "8.4"
        run: |
          mkdir -p .tools/mysql-client
          for command in mysql mysqldump; do
            cat > ".tools/mysql-client/${command}" <<'SH'
          #!/usr/bin/env sh
          set -eu
          command_name="$(basename "$0")"
          exec docker run -i --rm --network host -e MYSQL_PWD="${MYSQL_PWD:-}" "mysql:${MYSQL_VERSION:?}" "$command_name" "$@"
          SH
            chmod +x ".tools/mysql-client/${command}"
          done
          echo "$PWD/.tools/mysql-client" >> "$GITHUB_PATH"

      - name: MySQL to MariaDB restore rehearsal
        env:
          KRONOS_MYSQL_TEST_ADDR: 127.0.0.1:13306
          KRONOS_MYSQL_TEST_USER: root
          KRONOS_MYSQL_TEST_PASSWORD: mysql
          KRONOS_MYSQL_RESTORE_ADDR: 127.0.0.1:13307
          KRONOS_MYSQL_RESTORE_USER: root
          KRONOS_MYSQL_RESTORE_PASSWORD: mariadb
          KRONOS_MYSQL_DUMP_SET_GTID_PURGED: "off"
          KRONOS_MYSQL_BULK_ROWS: "1500"
          MYSQL_VERSION: "8.4"
        run: go test -tags=integration ./internal/drivers/mysql

  mariadb-to-mysql-restore-rehearsal:
    name: mariadb-to-mysql-restore-rehearsal (11.4-to-8.4)
    runs-on: ubuntu-latest
    services:
      mariadb-source:
        image: mariadb:11.4
        env:
          MARIADB_ROOT_PASSWORD: mariadb
        ports:
          - 14307:3306
        options: >-
          --health-cmd "healthcheck.sh --connect --innodb_initialized"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      mysql-target:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: mysql
        ports:
          - 14306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -uroot -pmysql"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'
          cache: true

      - name: Create hybrid MariaDB/MySQL client wrappers
        env:
          MARIADB_VERSION: "11.4"
          MYSQL_VERSION: "8.4"
        run: |
          mkdir -p .tools/mariadb-to-mysql-client
          cat > .tools/mariadb-to-mysql-client/mysql <<'SH'
          #!/usr/bin/env sh
          set -eu
          exec docker run -i --rm --network host -e MYSQL_PWD="${MYSQL_PWD:-}" "mysql:${MYSQL_VERSION:?}" mysql "$@"
          SH
          cat > .tools/mariadb-to-mysql-client/mysqldump <<'SH'
          #!/usr/bin/env sh
          set -eu
          exec docker run -i --rm --network host -e MYSQL_PWD="${MYSQL_PWD:-}" "mariadb:${MARIADB_VERSION:?}" mariadb-dump "$@"
          SH
          chmod +x .tools/mariadb-to-mysql-client/mysql .tools/mariadb-to-mysql-client/mysqldump
          echo "$PWD/.tools/mariadb-to-mysql-client" >> "$GITHUB_PATH"

      - name: MariaDB to MySQL restore rehearsal
        env:
          KRONOS_MYSQL_TEST_ADDR: 127.0.0.1:14307
          KRONOS_MYSQL_TEST_USER: root
          KRONOS_MYSQL_TEST_PASSWORD: mariadb
          KRONOS_MYSQL_RESTORE_ADDR: 127.0.0.1:14306
          KRONOS_MYSQL_RESTORE_USER: root
          KRONOS_MYSQL_RESTORE_PASSWORD: mysql
          KRONOS_MYSQL_DUMP_SET_GTID_PURGED: omit
          KRONOS_MYSQL_BULK_ROWS: "1500"
          MARIADB_VERSION: "11.4"
          MYSQL_VERSION: "8.4"
        run: go test -tags=integration ./internal/drivers/mysql

  mysql-operator-scale-restore-drill:
    name: mysql-operator-scale-restore-drill (8.4)
    runs-on: ubuntu-latest
    services:
      mysql-source:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: mysql
        ports:
          - 15306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -uroot -pmysql"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      mysql-target:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: mysql
        ports:
          - 15307:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -uroot -pmysql"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'
          cache: true

      - name: Create MySQL client wrappers
        env:
          MYSQL_VERSION: "8.4"
        run: |
          mkdir -p .tools/mysql-client
          for command in mysql mysqldump; do
            cat > ".tools/mysql-client/${command}" <<'SH'
          #!/usr/bin/env sh
          set -eu
          command_name="$(basename "$0")"
          exec docker run -i --rm --network host -e MYSQL_PWD="${MYSQL_PWD:-}" "mysql:${MYSQL_VERSION:?}" "$command_name" "$@"
          SH
            chmod +x ".tools/mysql-client/${command}"
          done
          echo "$PWD/.tools/mysql-client" >> "$GITHUB_PATH"

      - name: MySQL operator-scale restore drill
        env:
          KRONOS_MYSQL_TEST_ADDR: 127.0.0.1:15306
          KRONOS_MYSQL_TEST_USER: root
          KRONOS_MYSQL_TEST_PASSWORD: mysql
          KRONOS_MYSQL_RESTORE_ADDR: 127.0.0.1:15307
          KRONOS_MYSQL_RESTORE_USER: root
          KRONOS_MYSQL_RESTORE_PASSWORD: mysql
          KRONOS_MYSQL_DUMP_SET_GTID_PURGED: "off"
          KRONOS_MYSQL_BULK_ROWS: "10000"
          KRONOS_MYSQL_TEST_TIMEOUT_SECONDS: "180"
          MYSQL_VERSION: "8.4"
        run: go test -tags=integration ./internal/drivers/mysql

  mariadb-operator-scale-restore-drill:
    name: mariadb-operator-scale-restore-drill (11.4)
    runs-on: ubuntu-latest
    services:
      mariadb-source:
        image: mariadb:11.4
        env:
          MARIADB_ROOT_PASSWORD: mariadb
        ports:
          - 16306:3306
        options: >-
          --health-cmd "healthcheck.sh --connect --innodb_initialized"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      mariadb-target:
        image: mariadb:11.4
        env:
          MARIADB_ROOT_PASSWORD: mariadb
        ports:
          - 16307:3306
        options: >-
          --health-cmd "healthcheck.sh --connect --innodb_initialized"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'
          cache: true

      - name: Create MariaDB client wrappers
        env:
          MARIADB_VERSION: "11.4"
        run: |
          mkdir -p .tools/mariadb-client
          for command in mysql mysqldump; do
            cat > ".tools/mariadb-client/${command}" <<'SH'
          #!/usr/bin/env sh
          set -eu
          command_name="$(basename "$0")"
          case "$command_name" in
            mysql) client_command="mariadb" ;;
            mysqldump) client_command="mariadb-dump" ;;
            *) client_command="$command_name" ;;
          esac
          exec docker run -i --rm --network host -e MYSQL_PWD="${MYSQL_PWD:-}" "mariadb:${MARIADB_VERSION:?}" "$client_command" "$@"
          SH
