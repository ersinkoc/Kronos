name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'
          cache: true

      - name: Check formatting
        run: test -z "$(gofmt -l -s $(find . -name '*.go' -not -path './.git/*' -not -path './.tools/*' -not -path './bin/*'))"

      - name: Vet
        run: go vet ./...

      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Staticcheck
        run: staticcheck ./...

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Govulncheck
        run: govulncheck ./...

      - name: Test
        run: go test -race ./...

      - name: Production readiness gate
        run: ./scripts/production-check.sh

      - name: Build
        run: go build -trimpath -o bin/kronos ./cmd/kronos

      - name: Check build script
        run: |
          sh -n scripts/build.sh
          sh -n scripts/release.sh
          sh -n scripts/provenance.sh
          sh -n scripts/sbom.sh
          sh -n scripts/verify-release.sh
          sh -n scripts/smoke-release.sh
          sh -n scripts/production-check.sh

      - name: Build release artifact
        run: |
          RELEASE_TARGETS=linux/amd64 VERSION=ci COMMIT=${GITHUB_SHA::12} BUILD_DATE=1970-01-01T00:00:00Z ./scripts/release.sh
          VERSION=ci COMMIT=${GITHUB_SHA::12} BUILD_DATE=1970-01-01T00:00:00Z ./scripts/provenance.sh
          VERSION=ci COMMIT=${GITHUB_SHA::12} BUILD_DATE=1970-01-01T00:00:00Z ./scripts/sbom.sh
          ./scripts/verify-release.sh bin
          ./scripts/smoke-release.sh bin

      - name: Build container image
        run: |
          docker build \
            --build-arg VERSION=ci \
            --build-arg COMMIT=${GITHUB_SHA::12} \
            --build-arg BUILD_DATE=1970-01-01T00:00:00Z \
            -t kronos:ci .

      - name: Check completion script
        run: ./bin/kronos completion bash | bash -n

  postgres-conformance:
    name: postgres-conformance (${{ matrix.postgres-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        postgres-version:
          - "15"
          - "16"
          - "17"
    services:
      postgres:
        image: postgres:${{ matrix.postgres-version }}
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'
          cache: true

      - name: Create matching PostgreSQL client wrappers
        env:
          POSTGRES_VERSION: ${{ matrix.postgres-version }}
        run: |
          mkdir -p .tools/postgres-client
          for command in pg_dump pg_dumpall psql; do
            cat > ".tools/postgres-client/${command}" <<'SH'
          #!/usr/bin/env sh
          set -eu
          command_name="$(basename "$0")"
          exec docker run -i --rm --network host "postgres:${POSTGRES_VERSION:?}" "$command_name" "$@"
          SH
            chmod +x ".tools/postgres-client/${command}"
          done
          echo "$PWD/.tools/postgres-client" >> "$GITHUB_PATH"

      - name: PostgreSQL conformance
        env:
          KRONOS_POSTGRES_TEST_DSN: postgres://postgres:postgres@127.0.0.1:5432/postgres?sslmode=disable
          POSTGRES_VERSION: ${{ matrix.postgres-version }}
        run: go test -tags=integration ./internal/drivers/postgres

  postgres-upgrade-rehearsal:
    name: postgres-upgrade-rehearsal (15-to-17)
    runs-on: ubuntu-latest
    services:
      postgres-source:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 15432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
      postgres-target:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 17432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'
          cache: true

      - name: Create PostgreSQL 17 client wrappers
        env:
          POSTGRES_VERSION: "17"
        run: |
          mkdir -p .tools/postgres-client
          for command in pg_dump pg_dumpall psql; do
            cat > ".tools/postgres-client/${command}" <<'SH'
          #!/usr/bin/env sh
          set -eu
          command_name="$(basename "$0")"
          exec docker run -i --rm --network host "postgres:${POSTGRES_VERSION:?}" "$command_name" "$@"
          SH
            chmod +x ".tools/postgres-client/${command}"
          done
          echo "$PWD/.tools/postgres-client" >> "$GITHUB_PATH"

      - name: PostgreSQL 15 to 17 restore rehearsal
        env:
          KRONOS_POSTGRES_TEST_DSN: postgres://postgres:postgres@127.0.0.1:15432/postgres?sslmode=disable
          KRONOS_POSTGRES_RESTORE_DSN: postgres://postgres:postgres@127.0.0.1:17432/postgres?sslmode=disable
          POSTGRES_VERSION: "17"
        run: go test -tags=integration ./internal/drivers/postgres

  mysql-conformance:
    name: mysql-conformance (8.4)
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: mysql
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -uroot -pmysql"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'
          cache: true

      - name: Create MySQL client wrappers
        env:
          MYSQL_VERSION: "8.4"
        run: |
          mkdir -p .tools/mysql-client
          for command in mysql mysqldump; do
            cat > ".tools/mysql-client/${command}" <<'SH'
          #!/usr/bin/env sh
          set -eu
          command_name="$(basename "$0")"
          exec docker run -i --rm --network host "mysql:${MYSQL_VERSION:?}" "$command_name" "$@"
          SH
            chmod +x ".tools/mysql-client/${command}"
          done
          echo "$PWD/.tools/mysql-client" >> "$GITHUB_PATH"

      - name: MySQL conformance
        env:
          KRONOS_MYSQL_TEST_ADDR: 127.0.0.1:3306
          KRONOS_MYSQL_TEST_USER: root
          KRONOS_MYSQL_TEST_PASSWORD: mysql
          MYSQL_VERSION: "8.4"
        run: go test -tags=integration ./internal/drivers/mysql
