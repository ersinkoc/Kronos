name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: Version string to stamp into binaries
        required: true
        default: dev

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true

      - name: Test
        run: go test ./...

      - name: Build release artifacts
        env:
          VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
          COMMIT: ${{ github.sha }}
        run: |
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          VERSION="$VERSION" COMMIT="${COMMIT::12}" BUILD_DATE="$BUILD_DATE" ./scripts/release.sh
          VERSION="$VERSION" COMMIT="${COMMIT::12}" BUILD_DATE="$BUILD_DATE" BUILDER="github-actions:${GITHUB_RUN_ID}" ./scripts/provenance.sh
          VERSION="$VERSION" COMMIT="${COMMIT::12}" BUILD_DATE="$BUILD_DATE" ./scripts/sbom.sh

      - name: Verify checksums
        run: ./scripts/verify-release.sh bin

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kronos-release-${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
          path: |
            bin/kronos-*

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" bin/kronos-* \
            --verify-tag \
            --title "$GITHUB_REF_NAME" \
            --notes "Kronos release $GITHUB_REF_NAME. Verify downloads with the attached .sha256 files and inspect kronos-provenance.json plus kronos-sbom.json for build metadata."
