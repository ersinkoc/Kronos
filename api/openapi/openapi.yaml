        - $ref: "#/components/parameters/ID"
        - $ref: "#/components/parameters/IncludeSecrets"
      description: >
        Returns redacted option values by default. `include_secrets=true`
        requires `agent:write` in addition to `storage:read`.
      responses:
        "200":
          description: Storage
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Storage"
        "404":
          description: Storage not found
    put:
      summary: Update storage
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Storage"
      responses:
        "200":
          description: Updated storage
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Storage"
        "400":
          description: Invalid storage
        "404":
          description: Storage not found
    delete:
      summary: Delete storage
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "204":
          description: Deleted
        "404":
          description: Storage not found
  /api/v1/schedules:
    get:
      summary: List schedules
      responses:
        "200":
          description: Schedule list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SchedulesResponse"
    post:
      summary: Create schedule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Schedule"
      responses:
        "200":
          description: Created schedule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Schedule"
        "400":
          description: Invalid schedule
  /api/v1/schedules/{id}:
    get:
      summary: Get schedule
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Schedule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Schedule"
        "404":
          description: Schedule not found
    put:
      summary: Update schedule
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Schedule"
      responses:
        "200":
          description: Updated schedule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Schedule"
        "400":
          description: Invalid schedule
        "404":
          description: Schedule not found
    delete:
      summary: Delete schedule
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "204":
          description: Deleted
        "404":
          description: Schedule not found
  /api/v1/schedules/{id}/pause:
    post:
      summary: Pause schedule
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Paused schedule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Schedule"
        "404":
          description: Schedule not found
  /api/v1/schedules/{id}/resume:
    post:
      summary: Resume schedule
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Resumed schedule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Schedule"
        "404":
          description: Schedule not found
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  headers:
    RequestID:
      description: Request correlation identifier echoed by the control plane.
      schema:
        type: string
    NoStore:
      description: Control-plane responses are not cacheable.
      schema:
        type: string
        example: no-store
    ContentSecurityPolicy:
      description: Baseline same-origin browser content security policy.
      schema:
        type: string
    XContentTypeOptions:
      description: Prevent MIME sniffing.
      schema:
        type: string
        example: nosniff
    XFrameOptions:
      description: Prevent framing of API and WebUI responses.
      schema:
        type: string
        example: DENY
  parameters:
    ID:
      name: id
      in: path
      required: true
      schema:
        type: string
    IncludeSecrets:
      name: include_secrets
      in: query
      required: false
      description: Include unredacted option values for agent resource sync.
      schema:
        type: boolean
  schemas:
    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
        projects:
          type: integer
    ReadinessResponse:
      type: object
      required: [status, checks]
      properties:
        status:
          type: string
          enum: [ok, error]
        checks:
          type: object
          additionalProperties:
            type: string
            enum: [ok, error]
        error:
          type: string
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, status]
          properties:
            code:
              type: string
              description: Machine-readable HTTP status code name, such as bad_request.
            message:
              type: string
              description: Human-readable error message.
            status:
              type: integer
              description: HTTP status code.
            request_id:
              type: string
              description: Correlation ID echoed in X-Kronos-Request-ID.
    OKResponse:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
    OverviewResponse:
      type: object
      required: [generated_at, agents, inventory, jobs, backups, health, attention]
      properties:
        generated_at:
          type: string
          format: date-time
        agents:
          type: object
          required: [healthy, degraded, capacity]
          properties:
            healthy:
              type: integer
            degraded:
              type: integer
            capacity:
              type: integer
        inventory:
          type: object
          properties:
            targets:
              type: integer
            storages:
              type: integer
            schedules:
              type: integer
            schedules_paused:
              type: integer
            retention_policies:
              type: integer
            notification_rules:
              type: integer
            notification_rules_enabled:
              type: integer
            users:
              type: integer
        jobs:
          type: object
          required: [active, by_status]
          properties:
            active:
              type: integer
            by_status:
              type: object
              additionalProperties:
                type: integer
        backups:
          type: object
          required: [total, protected, bytes_total, by_type]
          properties:
            total:
              type: integer
            protected:
              type: integer
            bytes_total:
              type: integer
              format: int64
            latest_completed_timestamp:
              type: integer
              format: int64
            by_type:
              type: object
              additionalProperties:
                type: integer
        health:
          $ref: "#/components/schemas/ReadinessResponse"
        attention:
          type: object
          required:
            - degraded_agents
            - failed_jobs
            - readiness_errors
            - unprotected_backups
            - disabled_notification_rules
          properties:
            degraded_agents:
              type: integer
            failed_jobs:
              type: integer
            readiness_errors:
              type: integer
            unprotected_backups:
              type: integer
            disabled_notification_rules:
              type: integer
        latest_jobs:
          type: array
          items:
            $ref: "#/components/schemas/Job"
        latest_backups:
          type: array
          items:
            $ref: "#/components/schemas/Backup"
    AgentSnapshot:
      type: object
      required: [id, last_heartbeat, status]
      properties:
        id:
          type: string
        version:
          type: string
        address:
          type: string
        capacity:
          type: integer
        labels:
          type: object
          additionalProperties:
            type: string
        last_heartbeat:
          type: string
          format: date-time
        status:
          type: string
          enum: [healthy, degraded]
    AgentsResponse:
      type: object
      required: [agents]
      properties:
        agents:
          type: array
          items:
            $ref: "#/components/schemas/AgentSnapshot"
    AuditEvent:
      type: object
      required: [seq, id, action, resource_type, occurred_at, hash]
      properties:
        seq:
          type: integer
        id:
          type: string
        actor_id:
          type: string
        action:
          type: string
        resource_type:
          type: string
        resource_id:
          type: string
        metadata:
          type: object
          additionalProperties: true
        occurred_at:
          type: string
          format: date-time
        prev_hash:
          type: string
        hash:
          type: string
    AuditEventsResponse:
      type: object
      required: [events]
      properties:
        events:
          type: array
          items:
            $ref: "#/components/schemas/AuditEvent"
    AuthVerifyResponse:
      type: object
      required: [token]
      properties:
        token:
          $ref: "#/components/schemas/Token"
    TokensResponse:
      type: object
      required: [tokens]
      properties:
        tokens:
          type: array
          items:
            $ref: "#/components/schemas/Token"
    CreatedTokenResponse:
      type: object
      required: [token, secret]
      properties:
        token:
          $ref: "#/components/schemas/Token"
        secret:
          type: string
          description: Copy-once bearer secret. This value is never returned by list or inspect endpoints.
    PruneTokensResponse:
      type: object
      required: [deleted, dry_run, tokens]
      properties:
        deleted:
          type: integer
        dry_run:
          type: boolean
        tokens:
          type: array
          items:
            $ref: "#/components/schemas/Token"
    PruneTokensRequest:
      type: object
      properties:
        dry_run:
          type: boolean
    UsersResponse:
      type: object
      required: [users]
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/User"
    JobsResponse:
      type: object
      required: [jobs]
      properties:
        jobs:
          type: array
          items:
            $ref: "#/components/schemas/Job"
    ClaimJobResponse:
      type: object
      properties:
        job:
          $ref: "#/components/schemas/Job"
    BackupsResponse:
      type: object
      required: [backups]
      properties:
        backups:
          type: array
          items:
            $ref: "#/components/schemas/Backup"
    RetentionPoliciesResponse:
      type: object
      required: [policies]
      properties:
        policies:
          type: array
          items:
            $ref: "#/components/schemas/RetentionPolicy"
    TargetsResponse:
      type: object
      required: [targets]
      properties:
        targets:
          type: array
          items:
            $ref: "#/components/schemas/Target"
    StoragesResponse:
      type: object
      required: [storages]
      properties:
        storages:
          type: array
          items:
            $ref: "#/components/schemas/Storage"
    SchedulesResponse:
      type: object
      required: [schedules]
      properties:
        schedules:
          type: array
          items:
            $ref: "#/components/schemas/Schedule"
    AgentHeartbeat:
      type: object
      required: [id]
      properties:
        id:
          type: string
        version:
          type: string
        address:
          type: string
        capacity:
          type: integer
        labels:
          type: object
          additionalProperties:
            type: string
    BackupNowRequest:
      type: object
      required: [target_id, storage_id]
      properties:
        target_id:
          type: string
        storage_id:
          type: string
        type:
          type: string
          enum: [full, incr, diff, stream, schema]
        parent_id:
          type: string
          description: Parent backup id for incremental or differential backups.
    FinishJobRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [succeeded, failed, canceled]
        error:
          type: string
        backup:
          $ref: "#/components/schemas/Backup"
        failure:
          $ref: "#/components/schemas/FailureEvidence"
        restore:
          $ref: "#/components/schemas/RestoreReport"
        verification:
          $ref: "#/components/schemas/VerificationReport"
    CreateTokenRequest:
      type: object
      required: [name, user_id, scopes]
      properties:
        name:
          type: string
        user_id:
          type: string
        scopes:
          type: array
          items:
            type: string
        expires_at:
          type: string
          format: date-time
    Token:
      type: object
      required: [id, user_id, name, scopes, created_at]
      properties:
        id:
          type: string
        user_id:
          type: string
        name:
          type: string
        scopes:
          type: array
          items:
            type: string
        expires_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        revoked_at:
          type: string
          format: date-time
    User:
      type: object
      required: [email, display_name, role]
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        display_name:
          type: string
        role:
          type: string
          enum: [admin, operator, viewer]
        totp_enforced:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    Target:
      type: object
      required: [id, name, driver, endpoint]
      properties:
        id:
          type: string
        name:
          type: string
        driver:
          type: string
          enum: [postgres, mysql, mongodb, redis]
        endpoint:
          type: string
        database:
          type: string
        options:
          type: object
          additionalProperties: true
          description: Secret-like keys are redacted unless include_secrets=true is authorized.
        labels:
          type: object
          additionalProperties:
            type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    Storage:
      type: object
      required: [id, name, kind, uri]
      properties:
        id:
          type: string
        name:
          type: string
        kind:
          type: string
          enum: [local, s3, sftp, azure, gcs]
        uri:
          type: string
        options:
          type: object
          additionalProperties: true
          description: Secret-like keys are redacted unless include_secrets=true is authorized.
        labels:
          type: object
          additionalProperties:
            type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    Schedule:
      type: object
      required: [id, name, target_id, storage_id, backup_type, expression, paused, created_at, updated_at]
      properties:
        id:
          type: string
        name:
          type: string
        target_id:
          type: string
        storage_id:
          type: string
        backup_type:
          type: string
          enum: [full, incr, diff, stream, schema]
        expression:
          type: string
        retention_policy_id:
          type: string
        paused:
          type: boolean
        labels:
          type: object
          additionalProperties:
            type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    Backup:
      type: object
      required: [id, manifest_id]
      properties:
        id:
          type: string
        target_id:
          type: string
        storage_id:
          type: string
        job_id:
          type: string
        type:
          type: string
        parent_id:
          type: string
        manifest_id:
          type: string
        started_at:
          type: string
          format: date-time
        ended_at:
          type: string
          format: date-time
        size_bytes:
          type: integer
        chunk_count:
          type: integer
        protected:
          type: boolean
    BackupVerifyRequest:
      type: object
      properties:
        level:
          type: string
          enum: [manifest, chunk]
          default: chunk
    RestorePreviewRequest:
      type: object
      required: [backup_id]
      properties:
        backup_id:
          type: string
        target_id:
          type: string
        at:
          type: string
          format: date-time
          description: Optional point-in-time target timestamp. Future timestamps are rejected.
    RestoreStartRequest:
      allOf:
        - $ref: "#/components/schemas/RestorePreviewRequest"
        - type: object
          properties:
            dry_run:
              type: boolean
            replace_existing:
              type: boolean
    Job:
      type: object
      required: [id, status, queued_at]
      properties:
        id:
          type: string
        operation:
          type: string
          enum: [backup, restore, verify]
        schedule_id:
          type: string
        target_id:
          type: string
        storage_id:
          type: string
        type:
          type: string
          enum: [full, incr, diff, stream, schema]
        agent_id:
          type: string
        parent_backup_id:
          type: string
        restore_backup_id:
          type: string
        restore_manifest_id:
          type: string
        restore_manifest_ids:
          type: array
          items:
            type: string
        restore_target_id:
          type: string
        restore_at:
          type: string
          format: date-time
        restore_dry_run:
          type: boolean
        restore_replace_existing:
          type: boolean
        restore_report:
          $ref: "#/components/schemas/RestoreReport"
        failure_evidence:
          $ref: "#/components/schemas/FailureEvidence"
        evidence_artifact:
          $ref: "#/components/schemas/EvidenceArtifact"
        verify_backup_id:
          type: string
        verify_manifest_id:
          type: string
        verify_manifest_ids:
          type: array
          items:
            type: string
        verify_level:
          type: string
          enum: [manifest, chunk]
        verify_report:
          $ref: "#/components/schemas/VerificationReport"
        status:
          type: string
          enum: [queued, running, finalizing, succeeded, failed, canceled]
        queued_at:
          type: string
          format: date-time
        started_at:
          type: string
          format: date-time
        ended_at:
          type: string
          format: date-time
        error:
          type: string
    EvidenceArtifact:
      type: object
      properties:
        id:
          type: string
        job_id:
          type: string
        kind:
          type: string
        sha256:
          type: string
        created_at:
          type: string
          format: date-time
        restore:
          $ref: "#/components/schemas/RestoreEvidence"
    RestoreEvidence:
      type: object
      properties:
        operation:
          type: string
          enum: [backup, restore, verify]
        status:
          type: string
          enum: [queued, running, finalizing, succeeded, failed, canceled]
        backup_id:
          type: string
        target_id:
          type: string
        storage_id:
          type: string
        manifest_ids:
          type: array
          items:
            type: string
        restore_at:
          type: string
          format: date-time
        dry_run:
          type: boolean
        replace_existing:
          type: boolean
        queued_at:
          type: string
          format: date-time
        started_at:
          type: string
          format: date-time
        ended_at:
          type: string
          format: date-time
        error:
          type: string
        report:
          $ref: "#/components/schemas/RestoreReport"
        failure:
          $ref: "#/components/schemas/FailureEvidence"
    FailureEvidence:
      type: object
      properties:
        operation:
          type: string
          enum: [backup, restore, verify]
        stage:
          type: string
        message:
          type: string
        backup_id:
          type: string
        target_id:
          type: string
        storage_id:
          type: string
        manifest_ids:
          type: array
          items:
            type: string
        at:
          type: string
          format: date-time
    RestoreReport:
      type: object
      properties:
        backup_id:
          type: string
        target_id:
          type: string
        manifest_ids:
          type: array
          items:
            type: string
        objects:
          type: integer
        chunks:
          type: integer
        stored_bytes:
          type: integer
        restored_bytes:
          type: integer
        dry_run:
          type: boolean
    VerificationReport:
      type: object
      properties:
        backup_id:
          type: string
        level:
          type: string
          enum: [manifest, chunk]
        manifest_ids:
          type: array
          items:
            type: string
        objects:
          type: integer
        chunks:
          type: integer
        verified_chunks:
          type: integer
        stored_bytes:
          type: integer
        restored_bytes:
          type: integer
    RestoreStartResponse:
      type: object
      required: [job, plan]
      properties:
        job:
          $ref: "#/components/schemas/Job"
        plan:
          $ref: "#/components/schemas/RestorePlan"
    RestorePlan:
      type: object
      required: [backup_id, target_id, storage_id, steps]
      properties:
        backup_id:
          type: string
        target_id:
          type: string
        storage_id:
          type: string
        at:
          type: string
          format: date-time
        steps:
          type: array
          items:
            type: object
            properties:
              backup_id:
                type: string
              type:
                type: string
              parent_id:
                type: string
              manifest_id:
                type: string
              target_id:
                type: string
              storage_id:
                type: string
              started_at:
                type: string
                format: date-time
              ended_at:
                type: string
                format: date-time
        warnings:
          type: array
          items:
            type: string
    RetentionRule:
      type: object
      required: [kind]
      properties:
        kind:
          type: string
          enum: [count, time, size, gfs]
        params:
          type: object
          additionalProperties: true
    RetentionPolicy:
      type: object
      required: [id, name, rules, created_at, updated_at]
      properties:
        id:
          type: string
        name:
          type: string
        rules:
          type: array
          items:
            $ref: "#/components/schemas/RetentionRule"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    NotificationRule:
      type: object
      required: [id, name, events, webhook_url, enabled, created_at, updated_at]
      properties:
        id:
          type: string
        name:
          type: string
        events:
          type: array
          items:
            type: string
            enum: [job.succeeded, job.failed, job.canceled]
        webhook_url:
          type: string
          format: uri
        secret:
          type: string
          description: Optional HMAC signing secret. Redacted unless include_secrets=true is authorized.
        max_attempts:
          type: integer
          minimum: 0
          description: Maximum webhook delivery attempts. Zero uses the server default of one attempt.
        enabled:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    NotificationRulesResponse:
      type: object
      required: [notifications]
      properties:
        notifications:
          type: array
          items:
            $ref: "#/components/schemas/NotificationRule"
    RetentionPlanItem:
      type: object
      required: [backup, keep]
      properties:
        backup:
          $ref: "#/components/schemas/Backup"
        keep:
          type: boolean
        reasons:
          type: array
          items:
            type: string
    RetentionPlan:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/RetentionPlanItem"
    RetentionApplyResponse:
      type: object
      required: [plan, deleted, dry_run]
      properties:
        plan:
          $ref: "#/components/schemas/RetentionPlan"
        deleted:
          type: array
          items:
            type: string
        dry_run:
          type: boolean
