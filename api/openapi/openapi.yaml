openapi: 3.1.0
info:
  title: Kronos Control Plane API
  version: 0.1.0
  description: >
    Local/no-token mode accepts requests without Authorization. When a bearer
    token is provided, endpoints enforce exact scopes plus resource:*,
    admin:*, or *. Clients may send X-Kronos-Request-ID for request
    correlation; the control plane echoes it on every response or generates one
    when omitted. Health, readiness, metrics, and overview endpoints support
    GET and HEAD for probe-friendly status checks. Control-plane API, health,
    readiness, and metrics responses are sent with `Cache-Control: no-store`,
    and API/WebUI responses include baseline browser security headers such as
    X-Content-Type-Options,
    X-Frame-Options, Referrer-Policy, Permissions-Policy, and
    Content-Security-Policy.
servers:
  - url: http://127.0.0.1:8500
paths:
  /healthz:
    get:
      summary: Health check
      responses:
        "200":
          description: Server health
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
    head:
      summary: Health check headers
      responses:
        "200":
          description: Server health without a response body
  /readyz:
    get:
      summary: Readiness check
      responses:
        "200":
          description: State stores are readable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessResponse"
        "503":
          description: One or more state stores are unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessResponse"
    head:
      summary: Readiness check headers
      responses:
        "200":
          description: State stores are readable without a response body
        "503":
          description: One or more state stores are unavailable
  /metrics:
    get:
      summary: Prometheus metrics
      responses:
        "200":
          description: >
            Text exposition metrics, including kronos_build_info for binary
            build metadata, kronos_process_start_timestamp and
            kronos_process_uptime_seconds for process age, kronos_agents_capacity for
            schedulable agent capacity, kronos_jobs_active for active work,
            kronos_jobs_by_operation and kronos_jobs_active_by_operation for
            backup/restore work mix, kronos_jobs_active_by_agent for per-agent
            active work,
            kronos_targets_total, kronos_storages_total,
            kronos_schedules_total, and kronos_schedules_paused for
            control-plane inventory,
            kronos_targets_by_driver, kronos_storages_by_kind, and
            kronos_schedules_by_type for inventory distribution,
            kronos_backups with type labels for backup mix,
            kronos_backups_by_target and kronos_backups_bytes_by_target for
            target-level distribution,
            kronos_backups_by_storage and kronos_backups_bytes_by_storage for
            storage-level distribution,
            kronos_backups_bytes_total for logical backup bytes,
            kronos_backups_chunks_total for chunk volume,
            kronos_backups_latest_completed_timestamp plus target and storage
            labels for backup freshness,
            kronos_backups_protected for retention-protected backups,
            kronos_retention_policies_total, kronos_users_total,
            kronos_notification_rules_total, kronos_notification_rules_enabled,
            kronos_notification_rules_disabled, kronos_tokens_total,
            kronos_tokens_revoked, and
            kronos_tokens_expired for administrative
            inventory, kronos_audit_events_total for audit-chain depth, and
            kronos_auth_rate_limited_total for token verification requests
            rejected by throttling.
          content:
            text/plain:
              schema:
                type: string
    head:
      summary: Prometheus metrics headers
      responses:
        "200":
          description: Metrics endpoint availability without a response body
  /api/v1/overview:
    get:
      summary: Operations overview
      responses:
        "200":
          description: Aggregated dashboard counts and latest activity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OverviewResponse"
    head:
      summary: Operations overview headers
      responses:
        "200":
          description: Overview endpoint availability without a response body
  /api/v1/agents:
    get:
      summary: List agents
      responses:
        "200":
          description: Known agent snapshots
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentsResponse"
  /api/v1/agents/{id}:
    get:
      summary: Get agent
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Agent snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentSnapshot"
        "404":
          description: Agent not found
  /api/v1/agents/heartbeat:
    post:
      summary: Record agent heartbeat
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentHeartbeat"
      responses:
        "200":
          description: Updated agent snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentSnapshot"
  /api/v1/audit:
    get:
      summary: List audit events
      parameters:
        - name: actor_id
          in: query
          required: false
          schema:
            type: string
        - name: action
          in: query
          required: false
          schema:
            type: string
        - name: resource_type
          in: query
          required: false
          schema:
            type: string
        - name: resource_id
          in: query
          required: false
          schema:
            type: string
        - name: since
          in: query
          required: false
          description: RFC3339 timestamp or relative duration such as 7d or 24h.
          schema:
            type: string
        - name: until
          in: query
          required: false
          description: RFC3339 timestamp or relative duration such as 7d or 24h.
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
      responses:
        "200":
          description: Audit event list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditEventsResponse"
  /api/v1/audit/verify:
    post:
      summary: Verify audit hash chain
      responses:
        "200":
          description: Audit chain is valid and an audit.verified event was appended
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OKResponse"
        "409":
          description: Audit chain verification failed
  /api/v1/auth/verify:
    post:
      summary: Verify bearer API token
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Token is valid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthVerifyResponse"
        "401":
          description: Bearer token is missing or invalid
        "429":
          description: Too many token verification attempts
          headers:
            Retry-After:
              description: Seconds to wait before retrying token verification.
              schema:
                type: integer
  /api/v1/tokens:
    get:
      summary: List API tokens
      responses:
        "200":
          description: Token metadata list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokensResponse"
    post:
      summary: Create API token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTokenRequest"
      responses:
        "200":
          description: Created token metadata and copy-once bearer secret
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatedTokenResponse"
        "400":
          description: Invalid token request
        "403":
          description: Requested scopes are not allowed for the user
        "404":
          description: User not found
  /api/v1/tokens/{id}:
    get:
      summary: Get API token
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Token metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Token"
        "404":
          description: Token not found
  /api/v1/tokens/{id}/revoke:
    post:
      summary: Revoke API token
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Revoked token metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Token"
        "404":
          description: Token not found
  /api/v1/tokens/prune:
    post:
      summary: Prune revoked and expired API tokens
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PruneTokensRequest"
      responses:
        "200":
          description: Deleted token metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PruneTokensResponse"
        "400":
          description: Invalid token prune request
  /api/v1/users:
    get:
      summary: List users
      responses:
        "200":
          description: User list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsersResponse"
    post:
      summary: Create user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/User"
      responses:
        "200":
          description: Created user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Invalid user
  /api/v1/users/{id}:
    get:
      summary: Get user
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: User
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: User not found
    delete:
      summary: Delete user
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "204":
          description: Deleted
        "404":
          description: User not found
  /api/v1/users/{id}/grant:
    post:
      summary: Grant user role
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role:
                  type: string
                  enum: [admin, operator, viewer]
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Invalid grant request
        "404":
          description: User not found
  /api/v1/jobs:
    get:
      summary: List jobs
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [queued, running, finalizing, succeeded, failed, canceled]
        - name: operation
          in: query
          required: false
          schema:
            type: string
            enum: [backup, restore, verify]
        - name: target_id
          in: query
          required: false
          schema:
            type: string
        - name: storage_id
          in: query
          required: false
          schema:
            type: string
        - name: agent_id
          in: query
          required: false
          schema:
            type: string
        - name: restore_backup_id
          in: query
          required: false
          description: Filter restore jobs for one backup.
          schema:
            type: string
        - name: verify_backup_id
          in: query
          required: false
          description: Filter verification jobs for one backup.
          schema:
            type: string
        - name: since
          in: query
          required: false
          description: RFC3339 timestamp or relative duration such as 7d or 24h.
          schema:
            type: string
        - name: until
          in: query
          required: false
          description: RFC3339 timestamp or relative duration such as 7d or 24h.
          schema:
            type: string
      responses:
        "200":
          description: Job list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobsResponse"
  /api/v1/jobs/claim:
    post:
      summary: Claim the oldest queued job
      responses:
        "200":
          description: Claimed running job, or empty object when none are queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClaimJobResponse"
  /api/v1/jobs/{id}/finish:
    post:
      summary: Finish a job and optionally capture backup metadata
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FinishJobRequest"
      responses:
        "200":
          description: Finished job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "400":
          description: Invalid terminal status or backup metadata
        "404":
          description: Job not found
  /api/v1/jobs/{id}:
    get:
      summary: Inspect a job
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Job metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "404":
          description: Job not found
  /api/v1/jobs/{id}/evidence:
    get:
      summary: Export a job evidence artifact
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Hash-addressed evidence artifact
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvidenceArtifact"
        "404":
          description: Evidence artifact not found
  /api/v1/jobs/{id}/cancel:
    post:
      summary: Cancel a queued or running job
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Canceled job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "404":
          description: Job not found
  /api/v1/jobs/{id}/retry:
    post:
      summary: Requeue a failed or canceled job
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Requeued job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "400":
          description: Job is not failed or canceled
        "404":
          description: Job not found
  /api/v1/scheduler/tick:
    post:
      summary: Evaluate schedules once and enqueue due jobs
      responses:
        "200":
          description: Jobs enqueued by this tick
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobsResponse"
        "503":
          description: Scheduler stores are not configured
  /api/v1/backups:
    get:
      summary: List backups
      parameters:
        - name: target_id
          in: query
          required: false
          schema:
            type: string
        - name: storage_id
          in: query
          required: false
          schema:
            type: string
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [full, incr, diff, stream, schema]
        - name: since
          in: query
          required: false
          description: RFC3339 timestamp or relative duration such as 7d or 24h.
          schema:
            type: string
        - name: until
          in: query
          required: false
          description: RFC3339 timestamp or relative duration such as 7d or 24h.
          schema:
            type: string
        - name: protected
          in: query
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: Backup list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BackupsResponse"
  /api/v1/backups/now:
    post:
      summary: Enqueue an immediate backup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BackupNowRequest"
      responses:
        "200":
          description: Queued job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "400":
          description: Invalid backup request
  /api/v1/backups/{id}:
    get:
      summary: Inspect a backup
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Backup metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Backup"
        "404":
          description: Backup not found
  /api/v1/backups/{id}/protect:
    post:
      summary: Enable manual protection
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Updated backup metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Backup"
        "404":
          description: Backup not found
  /api/v1/backups/{id}/verify:
    post:
      summary: Enqueue backup verification
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BackupVerifyRequest"
      responses:
        "200":
          description: Queued verification job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "400":
          description: Invalid backup verify request
        "404":
          description: Backup not found
  /api/v1/backups/{id}/unprotect:
    post:
      summary: Disable manual protection
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Updated backup metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Backup"
        "404":
          description: Backup not found
  /api/v1/retention/plan:
    post:
      summary: Preview retention decisions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RetentionPlanRequest"
      responses:
        "200":
          description: Retention plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetentionPlan"
        "400":
          description: Invalid retention plan request
  /api/v1/retention/apply:
    post:
      summary: Apply retention decisions to backup metadata
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RetentionApplyRequest"
      responses:
        "200":
          description: Retention plan plus deleted backup IDs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetentionApplyResponse"
        "400":
          description: Invalid retention apply request
  /api/v1/retention/policies:
    get:
      summary: List retention policies
      responses:
        "200":
          description: Retention policy list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetentionPoliciesResponse"
    post:
      summary: Create retention policy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RetentionPolicy"
      responses:
        "200":
          description: Created retention policy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetentionPolicy"
        "400":
          description: Invalid retention policy
  /api/v1/retention/policies/{id}:
    get:
      summary: Get retention policy
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Retention policy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetentionPolicy"
        "404":
          description: Retention policy not found
    put:
      summary: Update retention policy
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RetentionPolicy"
      responses:
        "200":
          description: Updated retention policy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetentionPolicy"
        "400":
          description: Invalid retention policy
        "404":
          description: Retention policy not found
    delete:
      summary: Delete retention policy
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "204":
          description: Deleted
        "404":
          description: Retention policy not found
  /api/v1/notifications:
    get:
      summary: List notification rules
      parameters:
        - $ref: "#/components/parameters/IncludeSecrets"
      description: >
        Returns redacted webhook secrets by default. `include_secrets=true`
        requires `notification:write` in addition to `notification:read`.
      responses:
        "200":
          description: Notification rule list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationRulesResponse"
    post:
      summary: Create notification rule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NotificationRule"
      responses:
        "200":
          description: Created notification rule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationRule"
        "400":
          description: Invalid notification rule
  /api/v1/notifications/{id}:
    get:
      summary: Get notification rule
      parameters:
        - $ref: "#/components/parameters/ID"
        - $ref: "#/components/parameters/IncludeSecrets"
      description: >
        Returns redacted webhook secrets by default. `include_secrets=true`
        requires `notification:write` in addition to `notification:read`.
      responses:
        "200":
          description: Notification rule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationRule"
        "404":
          description: Notification rule not found
    put:
      summary: Update notification rule
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NotificationRule"
      responses:
        "200":
          description: Updated notification rule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationRule"
        "400":
          description: Invalid notification rule
        "404":
          description: Notification rule not found
    delete:
      summary: Delete notification rule
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "204":
          description: Deleted
        "404":
          description: Notification rule not found
  /api/v1/restore:
    post:
      summary: Enqueue a restore job
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RestoreStartRequest"
      responses:
        "200":
          description: Queued restore job and restore plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestoreStartResponse"
        "400":
          description: Invalid backup chain or request
        "404":
          description: Backup not found
  /api/v1/restore/preview:
    post:
      summary: Preview restore chain and target
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RestorePreviewRequest"
      responses:
        "200":
          description: Restore plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestorePlan"
        "400":
          description: Invalid backup chain or request
        "404":
          description: Backup not found
  /api/v1/targets:
    get:
      summary: List targets
      parameters:
        - $ref: "#/components/parameters/IncludeSecrets"
      description: >
        Returns redacted option values by default. `include_secrets=true`
        requires `agent:write` in addition to `target:read`.
      responses:
        "200":
          description: Target list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TargetsResponse"
    post:
      summary: Create target
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Target"
      responses:
        "200":
          description: Created target
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Target"
        "400":
          description: Invalid target
  /api/v1/targets/{id}:
    get:
      summary: Get target
      parameters:
        - $ref: "#/components/parameters/ID"
        - $ref: "#/components/parameters/IncludeSecrets"
      description: >
        Returns redacted option values by default. `include_secrets=true`
        requires `agent:write` in addition to `target:read`.
      responses:
        "200":
          description: Target
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Target"
        "404":
          description: Target not found
    put:
      summary: Update target
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Target"
      responses:
        "200":
          description: Updated target
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Target"
        "400":
          description: Invalid target
        "404":
          description: Target not found
    delete:
      summary: Delete target
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "204":
          description: Deleted
        "404":
          description: Target not found
  /api/v1/storages:
    get:
      summary: List storages
      parameters:
        - $ref: "#/components/parameters/IncludeSecrets"
      description: >
        Returns redacted option values by default. `include_secrets=true`
        requires `agent:write` in addition to `storage:read`.
      responses:
        "200":
          description: Storage list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoragesResponse"
    post:
      summary: Create storage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Storage"
      responses:
        "200":
          description: Created storage
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Storage"
        "400":
          description: Invalid storage
  /api/v1/storages/{id}:
    get:
      summary: Get storage
