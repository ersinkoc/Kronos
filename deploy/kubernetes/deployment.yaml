apiVersion: apps/v1
kind: Deployment
metadata:
  name: kronos-control-plane
  namespace: kronos
  labels:
    app.kubernetes.io/name: kronos
    app.kubernetes.io/component: control-plane
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kronos
      app.kubernetes.io/component: control-plane
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kronos
        app.kubernetes.io/component: control-plane
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
      containers:
        - name: kronos
          image: ghcr.io/kronosbackup/kronos:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          args:
            - server
            - --config
            - /etc/kronos/kronos.yaml
          ports:
            - name: http
              containerPort: 8500
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 30
            failureThreshold: 3
          volumeMounts:
            - name: config
              mountPath: /etc/kronos
              readOnly: true
            - name: state
              mountPath: /var/lib/kronos
      volumes:
        - name: config
          configMap:
            name: kronos-config
        - name: state
          persistentVolumeClaim:
            claimName: kronos-state
