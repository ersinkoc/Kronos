apiVersion: apps/v1
kind: Deployment
metadata:
  name: kronos-agent
  namespace: kronos
  labels:
    app.kubernetes.io/name: kronos
    app.kubernetes.io/component: agent
spec:
  replicas: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: kronos
      app.kubernetes.io/component: agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kronos
        app.kubernetes.io/component: agent
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
      containers:
        - name: kronos-agent
          image: ghcr.io/kronosbackup/kronos:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          args:
            - agent
            - --work
            - --server
            - http://kronos-control-plane:8500
            - --id
            - $(POD_NAME)
            - --capacity
            - $(KRONOS_AGENT_CAPACITY)
            - --key-id
            - $(KRONOS_KEY_ID)
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: KRONOS_AGENT_CAPACITY
              value: "1"
            - name: KRONOS_KEY_ID
              value: prod-2026
            - name: KRONOS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: kronos-agent-secrets
                  key: token
            - name: KRONOS_MANIFEST_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: kronos-agent-secrets
                  key: manifest-private-key
            - name: KRONOS_CHUNK_KEY
              valueFrom:
                secretKeyRef:
                  name: kronos-agent-secrets
                  key: chunk-key
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 1Gi
